name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name : login to doker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name : buid Image
        run : |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/home-frontend:latest .

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/home-frontend:latest
