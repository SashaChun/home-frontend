name: Frontend CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Run Tests & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test -- --run

      - name: Build app
        run: npm run build

  docker:
    name: Build, Scan, Sign & Push
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write        # keyless cosign signing via GitHub OIDC
    env:
      IMAGE: ${{ secrets.DOCKER_USERNAME || 'local' }}/home-frontend
      PUSH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1) Build locally so we can scan before pushing
      - name: Build image (load locally for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2) Fail on FIXABLE High/Critical vulnerabilities
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Login to Docker Hub
        if: env.PUSH == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3) Push (cached); capture digest for signing
      - name: Push image
        id: push
        if: env.PUSH == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha

      # 4) Keyless sign the pushed image by digest
      - name: Install cosign
        if: env.PUSH == 'true'
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        if: env.PUSH == 'true'
        run: cosign sign --yes "${IMAGE}@${{ steps.push.outputs.digest }}"